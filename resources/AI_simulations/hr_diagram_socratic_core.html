<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>H-R Diagram Socratic Lab</title>
  <style>
    :root{--bg:#0a1020;--card:#18223f;--line:#35527f;--text:#edf4ff;--muted:#a6c2e0;--a:#5ec9ff;--ok:#89e9b1;--warn:#ffd06c}
    *{box-sizing:border-box} body{margin:0;font-family:"Segoe UI",Tahoma,sans-serif;background:linear-gradient(155deg,#070d18,#121f3b);color:var(--text)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .title{font-size:24px;color:var(--a);font-weight:700}.sub{font-size:13px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:320px 1fr;gap:12px;margin-top:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
    input,textarea{width:100%;background:#0e1931;border:1px solid #406698;border-radius:7px;color:var(--text);padding:7px 9px}
    textarea{min-height:120px;resize:vertical}
    .btn{border:1px solid var(--line);border-radius:7px;padding:7px 10px;background:linear-gradient(180deg,#329dd0,#1f648e);color:#fff;font-weight:600;cursor:pointer;font-size:12px}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    #hr{width:100%;height:430px;display:block;background:#0a1528;border:1px solid var(--line);border-radius:10px}
    .q{font-size:13px;color:var(--text);margin:8px 0}.a{font-size:13px;color:var(--ok);margin-top:6px}
    @media(max-width:950px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <div class="title">Unit 3: H-R Diagram and Socratic Tutor Lab</div>
        <div class="sub">Creator and Maintainer: Dr. Nitesh Kumar, UPES</div>
      </div>
      <a class="btn" href="phys4022p_llm_sim_hub.html" style="text-decoration:none">Back to PHYS4022P Hub</a>
    </div>

    <div class="grid">
      <section class="card">
        <label>Initial stellar mass (M_sun)</label>
        <input id="mass" type="range" min="0.5" max="25" step="0.1" value="1" />
        <div id="massVal" style="font-size:12px;color:var(--muted);margin:5px 0 8px">1.0 M_sun</div>

        <label>Evolutionary age fraction (0 to 1)</label>
        <input id="age" type="range" min="0" max="1" step="0.01" value="0.2" />

        <div class="row" style="margin-top:10px">
          <button class="btn" id="reset">Reset</button>
          <button class="btn" id="ask">Ask Socratic Question</button>
        </div>

        <div class="q" id="sq">Question: click Ask Socratic Question.</div>
        <textarea id="studentAnswer" placeholder="Write your answer here..."></textarea>
        <button class="btn" id="feedback" style="margin-top:8px">Get Guided Feedback</button>
        <div class="a" id="fb"></div>
      </section>

      <section class="card">
        <canvas id="hr"></canvas>
      </section>
    </div>
  </div>

<script>
"use strict";
const cv=document.getElementById("hr"),ctx=cv.getContext("2d");
const questions=[
  "Why do high-mass stars evolve faster than low-mass stars despite having more fuel?",
  "How does the H-R diagram help distinguish giant stars from main-sequence stars?",
  "Why does a star move off the main sequence after core hydrogen exhaustion?",
  "What is the physical significance of the Chandrasekhar mass limit?",
  "How can luminosity and temperature together constrain stellar radius?"
];
let currentQ="";

function resize(){
  const dpr=window.devicePixelRatio||1;
  cv.width=Math.floor(cv.clientWidth*dpr);
  cv.height=Math.floor(cv.clientHeight*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function stellarPoint(mass,age){
  const logT0=Math.log10(5800*Math.pow(mass,0.35));
  const logL0=Math.log10(Math.pow(mass,3.5));
  const turn=Math.min(1,Math.max(0,(mass*age)-0.65));
  const logT=logT0-0.28*turn;
  const logL=logL0+1.0*turn;
  return {logT,logL};
}

function draw(){
  const m=parseFloat(document.getElementById("mass").value);
  const a=parseFloat(document.getElementById("age").value);
  document.getElementById("massVal").textContent=m.toFixed(1)+" M_sun";

  const w=cv.clientWidth,h=cv.clientHeight;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle="#0a1528";ctx.fillRect(0,0,w,h);
  const x0=58,y0=h-36,pw=w-84,ph=h-62;
  ctx.strokeStyle="rgba(166,194,224,.28)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x0,y0-ph);ctx.lineTo(x0+pw,y0-ph);ctx.stroke();

  const Tmin=3.45,Tmax=4.60,Lmin=-4,Lmax=6;
  function sx(logT){return x0 + (Tmax-logT)/(Tmax-Tmin)*pw;}
  function sy(logL){return y0 - (logL-Lmin)/(Lmax-Lmin)*ph;}

  ctx.strokeStyle="rgba(94,201,255,.5)";
  ctx.beginPath();
  for(let i=0;i<=200;i++){
    const ag=i/200;
    const p=stellarPoint(m,ag);
    const x=sx(p.logT),y=sy(p.logL);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.lineWidth=2;ctx.stroke();

  const p=stellarPoint(m,a);
  const px=sx(p.logT),py=sy(p.logL);
  ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fillStyle="#ffd06c";ctx.fill();

  const classes=[
    {name:"Main Sequence",x:sx(3.85),y:sy(0.0)},
    {name:"Giants",x:sx(3.65),y:sy(2.2)},
    {name:"White Dwarfs",x:sx(4.2),y:sy(-2.2)}
  ];
  ctx.fillStyle="#a6c2e0";ctx.font="12px Segoe UI";
  classes.forEach(c=>ctx.fillText(c.name,c.x,c.y));
  ctx.fillText("Temperature (log10 K, hot to cool ->)",x0+pw-250,y0+23);
  ctx.fillText("Luminosity (log10 L/Lsun)",8,y0-ph+8);
  ctx.fillText("Current: logT="+p.logT.toFixed(3)+", logL="+p.logL.toFixed(3),x0+8,y0-ph+18);
}

function askQuestion(){
  currentQ=questions[Math.floor(Math.random()*questions.length)];
  document.getElementById("sq").textContent="Question: "+currentQ;
  document.getElementById("fb").textContent="";
}

function coach(){
  const ans=document.getElementById("studentAnswer").value.trim();
  if(!currentQ){askQuestion();return;}
  if(!ans){document.getElementById("fb").textContent="Write a brief answer first, then ask for feedback.";return;}
  const hints=[];
  if(ans.length<40) hints.push("Expand with one physical mechanism and one observable consequence.");
  if(!/mass|gravity|pressure|temperature|fusion|core|luminosity/i.test(ans)) hints.push("Include at least one key physics term: mass, fusion rate, core pressure, luminosity.");
  if(!/therefore|because|hence|so/i.test(ans)) hints.push("Strengthen causal flow using reasoning words (because, hence, therefore).");
  if(!hints.length) hints.push("Good structure. Next, add one equation-based approximation to make it stronger.");
  document.getElementById("fb").textContent="Guided feedback: "+hints.join(" ");
}

document.getElementById("mass").addEventListener("input",draw);
document.getElementById("age").addEventListener("input",draw);
document.getElementById("reset").addEventListener("click",()=>{document.getElementById("mass").value="1";document.getElementById("age").value="0.2";draw();});
document.getElementById("ask").addEventListener("click",askQuestion);
document.getElementById("feedback").addEventListener("click",coach);
window.addEventListener("resize",()=>{resize();draw();});
resize();draw();askQuestion();
</script>
</body>
</html>
